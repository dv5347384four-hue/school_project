apiVersion: apps/v1
kind: Deployment
metadata: { name: school-server }
spec:
  replicas: 3
  selector: { matchLabels: { app: school-server } }
  template:
    metadata: { labels: { app: school-server } }
    spec:
      containers:
        - name: server
          image: ghcr.io/example/school-server:latest
          ports: [{ containerPort: 4000 }]
---
apiVersion: v1
kind: Service
metadata: { name: school-server }
spec:
  selector: { app: school-server }
  ports: [{ port: 80, targetPort: 4000 }]
